<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการและเบิกจ่ายอุปกรณ์ในคลัง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="bg-white shadow-sm rounded-2xl p-6 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
                    📦 ระบบคลังอุปกรณ์ & เบิก-จ่ายอัตโนมัติ
                </h1>
                <p class="text-sm text-slate-500">จัดการสต็อก ตรวจสอบสถานะ และทำรายการเบิก-คืนได้อย่างรวดเร็ว</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="openAddModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm">➕ เพิ่มอุปกรณ์ใหม่</button>
                <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm">📥 โหลด Excel</button>
                <label class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-sm cursor-pointer">
                    📤 นำเข้า Excel <input type="file" id="excelFile" class="hidden" accept=".xlsx, .xls" onchange="importFromExcel(event)">
                </label>
            </div>
        </header>

        <!-- Search & Filter Bar -->
        <div class="bg-white shadow-sm rounded-2xl p-4 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="w-full md:w-1/3">
                <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="🔍 ค้นหาชื่ออุปกรณ์, S/N, หรือผู้ถือครอง..." class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 text-sm">
            </div>
            <div class="flex flex-wrap gap-3 w-full md:w-auto">
                <select id="categoryFilter" onchange="renderTable()" class="px-3 py-2 border rounded-xl text-sm bg-white">
                    <option value="">ทุกหมวดหมู่</option>
                    <option value="โทรศัพท์">📱 โทรศัพท์</option>
                    <option value="ประตู">🚪 ประตู</option>
                    <option value="กล้อง">📷 กล้อง</option>
                    <option value="เน็ตเวิร์ค">🌐 เน็ตเวิร์ค</option>
                    <option value="เครื่องมือช่าง">🔧 เครื่องมือช่าง</option>
                    <option value="อื่นๆ">📦 อื่นๆ</option>
                </select>
                <select id="statusFilter" onchange="renderTable()" class="px-3 py-2 border rounded-xl text-sm bg-white">
                    <option value="">ทุกสถานะ</option>
                    <option value="ปกติ">ปกติ (พร้อมใช้)</option>
                    <option value="กำลังใช้งาน">กำลังใช้งาน</option>
                    <option value="ส่งซ่อม/ชำรุด">ส่งซ่อม/ชำรุด</option>
                </select>
            </div>
        </div>

        <!-- Inventory Table -->
        <div class="bg-white shadow-sm rounded-2xl overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                            <th class="p-4">ลำดับ</th>
                            <th class="p-4">รหัส / S/N</th>
                            <th class="p-4">ชื่ออุปกรณ์</th>
                            <th class="p-4">หมวดหมู่</th>
                            <th class="p-4 text-center">คงเหลือ</th>
                            <th class="p-4">สถานะ</th>
                            <th class="p-4">ผู้ถือครอง / สถานที่ล่าสุด</th>
                            <th class="p-4 text-center">ทำรายการเบิก-คืน</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal เพิ่ม/แก้ไข อุปกรณ์ -->
    <div id="itemModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl">
            <h3 id="modalTitle" class="text-lg font-bold mb-4 text-blue-600">เพิ่มอุปกรณ์ใหม่</h3>
            <form id="itemForm" onsubmit="saveItem(event)">
                <input type="hidden" id="itemIndex">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">รหัส / S/N อุปกรณ์</label>
                        <input type="text" id="itemSn" required class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">ชื่ออุปกรณ์</label>
                        <input type="text" id="itemName" required class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">หมวดหมู่</label>
                            <select id="itemCategory" class="w-full px-3 py-2 border rounded-xl text-sm bg-white">
                                <option value="โทรศัพท์">โทรศัพท์</option>
                                <option value="ประตู">ประตู</option>
                                <option value="กล้อง">กล้อง</option>
                                <option value="เน็ตเวิร์ค">เน็ตเวิร์ค</option>
                                <option value="เครื่องมือช่าง">เครื่องมือช่าง</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">จำนวนในคลัง</label>
                            <input type="number" id="itemQty" value="1" min="0" required class="w-full px-3 py-2 border rounded-xl text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">สถานะเริ่มต้น</label>
                        <select id="itemStatus" class="w-full px-3 py-2 border rounded-xl text-sm bg-white">
                            <option value="ปกติ">ปกติ (พร้อมใช้)</option>
                            <option value="กำลังใช้งาน">กำลังใช้งาน</option>
                            <option value="ส่งซ่อม/ชำรุด">ส่งซ่อม/ชำรุด</option>
                        </select>
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-medium">ยกเลิก</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal ทำรายการ เบิก-คืน (แบบระบุรายละเอียด) -->
    <div id="transactionModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl">
            <h3 id="transTitle" class="text-lg font-bold mb-1 text-blue-600">ทำรายการอุปกรณ์</h3>
            <p id="transItemInfo" class="text-xs text-slate-500 mb-4"></p>
            <form onsubmit="executeTransaction(event)">
                <input type="hidden" id="transIndex">
                <input type="hidden" id="transMode"> <!-- 'borrow' หรือ 'return' -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" id="qtyLabel">จำนวนที่ต้องการเบิก</label>
                        <input type="number" id="transQty" value="1" min="1" required class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" id="nameLabel">ชื่อผู้เบิก / หน่วยงาน</label>
                        <input type="text" id="transName" placeholder="เช่น ร.ต.อ. สมชาย" required class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">หมายเหตุ / วัตถุประสงค์</label>
                        <input type="text" id="transNote" placeholder="เช่น นำไปติดตั้งจุดตรวจ A, ซ่อมบำรุงประจำเดือน" class="w-full px-3 py-2 border rounded-xl text-sm">
                    </div>
                </div>
                <div class="mt-6 flex justify-end gap-2">
                    <button type="button" onclick="closeTransModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-medium">ยกเลิก</button>
                    <button type="submit" id="transSubmitBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium">ยืนยันเบิกของ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal QR Code -->
    <div id="qrModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-xs w-full p-6 text-center shadow-xl">
            <h3 class="font-bold text-slate-800 mb-1">QR Code อุปกรณ์</h3>
            <p id="qrItemName" class="text-xs text-slate-500 mb-4"></p>
            <div id="qrcode" class="flex justify-center p-4 bg-slate-50 border rounded-xl mb-4"></div>
            <button onclick="closeQrModal()" class="w-full py-2 bg-slate-100 hover:bg-slate-200 rounded-xl text-sm font-medium">ปิด</button>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventoryData')) || [
            { sn: "TEL-01", name: "IP Phone Cisco", category: "โทรศัพท์", qty: 5, status: "ปกติ", holder: "คลังหลัก" },
            { sn: "CAM-01", name: "IP Camera Outdoor", category: "กล้อง", qty: 2, status: "กำลังใช้งาน", holder: "ร.ต.อ. สมชาย" }
        ];

        function saveData() {
            localStorage.setItem('inventoryData', JSON.stringify(inventory));
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('inventoryTableBody');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const catFilter = document.getElementById('categoryFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            tbody.innerHTML = '';

            const filtered = inventory.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(search) || item.sn.toLowerCase().includes(search) || (item.holder && item.holder.toLowerCase().includes(search));
                const matchCat = catFilter === "" || item.category === catFilter;
                const matchStatus = statusFilter === "" || item.status === statusFilter;
                return matchSearch && matchCat && matchStatus;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center p-6 text-slate-400">ไม่พบข้อมูลอุปกรณ์ตามเงื่อนไข</td></tr>`;
                return;
            }

            filtered.forEach((item) => {
                const idx = inventory.indexOf(item);
                let badge = item.status === 'ปกติ' ? 'bg-emerald-100 text-emerald-700' : (item.status === 'กำลังใช้งาน' ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-700');

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition">
                        <td class="p-4 text-slate-500">${idx + 1}</td>
                        <td class="p-4 font-semibold text-blue-600">${item.sn}</td>
                        <td class="p-4">${item.name}</td>
                        <td class="p-4"><span class="px-2.5 py-1 bg-slate-100 rounded-lg text-xs text-slate-600">${item.category}</span></td>
                        <td class="p-4 text-center font-bold text-base ${item.qty === 0 ? 'text-rose-600' : 'text-slate-800'}">${item.qty}</td>
                        <td class="p-4"><span class="px-2.5 py-1 rounded-full text-xs font-semibold ${badge}">${item.status}</span></td>
                        <td class="p-4 text-slate-600 text-xs">${item.holder || '-'}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1.5">
                                <button onclick="openTransModal(${idx}, 'borrow')" class="px-3 py-1 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-lg text-xs font-semibold transition" title="เบิกของ">📤 เบิก</button>
                                <button onclick="openTransModal(${idx}, 'return')" class="px-3 py-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-lg text-xs font-semibold transition" title="คืนของ">📥 คืน</button>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1">
                                <button onclick="showQRCode('${item.sn}', '${item.name}')" class="p-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg" title="พิมพ์ QR">🖨️</button>
                                <button onclick="editItem(${idx})" class="p-1.5 bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-lg" title="แก้ไข">✏️</button>
                                <button onclick="deleteItem(${idx})" class="p-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg" title="ลบ">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // จัดการหน้าต่าง เบิก-คืน
        function openTransModal(idx, mode) {
            const item = inventory[idx];
            document.getElementById('transIndex').value = idx;
            document.getElementById('transMode').value = mode;
            document.getElementById('transItemInfo').innerText = `อุปกรณ์: ${item.name} (รหัส: ${item.sn}) | คงเหลือในคลัง: ${item.qty}`;
            document.getElementById('transQty').value = 1;
            document.getElementById('transName').value = "";
            document.getElementById('transNote').value = "";

            if (mode === 'borrow') {
                document.getElementById('transTitle').innerText = "📤 ทำรายการเบิกอุปกรณ์";
                document.getElementById('qtyLabel').innerText = "จำนวนที่ต้องการเบิก";
                document.getElementById('nameLabel').innerText = "ชื่อผู้เบิก / หน่วยงาน";
                document.getElementById('transSubmitBtn').innerText = "ยืนยันเบิกของ";
                document.getElementById('transSubmitBtn').className = "px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-medium";
            } else {
                document.getElementById('transTitle').innerText = "📥 ทำรายการคืนอุปกรณ์เข้าคลัง";
                document.getElementById('qtyLabel').innerText = "จำนวนที่ส่งคืน";
                document.getElementById('nameLabel').innerText = "ชื่อผู้ส่งคืน";
                document.getElementById('transSubmitBtn').innerText = "ยืนยันรับคืน";
                document.getElementById('transSubmitBtn').className = "px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-sm font-medium";
            }

            document.getElementById('transactionModal').classList.remove('hidden');
        }

        function closeTransModal() {
            document.getElementById('transactionModal').classList.add('hidden');
        }

        function executeTransaction(e) {
            e.preventDefault();
            const idx = parseInt(document.getElementById('transIndex').value);
            const mode = document.getElementById('transMode').value;
            const qty = parseInt(document.getElementById('transQty').value);
            const name = document.getElementById('transName').value;
            const note = document.getElementById('transNote').value;
            const item = inventory[idx];

            if (mode === 'borrow') {
                if (item.qty < qty) {
                    alert("⚠️ จำนวนอุปกรณ์ในคลังไม่พอเบิก (คงเหลือไม่เพียงพอ)");
                    return;
                }
                item.qty -= qty;
                item.status = item.qty === 0 ? 'หมด / กำลังใช้งาน' : 'กำลังใช้งาน';
                item.holder = `${name} (${note || 'เบิกใช้งาน'})`;
            } else {
                item.qty += qty;
                item.status = 'ปกติ';
                item.holder = `คลังหลัก (${name} คืน - ${note || 'ปกติ'})`;
            }

            saveData();
            closeTransModal();
            alert("✅ ทำรายการสำเร็จ!");
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "เพิ่มอุปกรณ์ใหม่";
            document.getElementById('itemIndex').value = "";
            document.getElementById('itemForm').reset();
            document.getElementById('itemModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('itemModal').classList.add('hidden'); }

        function editItem(idx) {
            const item = inventory[idx];
            document.getElementById('modalTitle').innerText = "แก้ไขข้อมูลอุปกรณ์";
            document.getElementById('itemIndex').value = idx;
            document.getElementById('itemSn').value = item.sn;
            document.getElementById('itemName').value = item.name;
            document.getElementById('itemCategory').value = item.category;
            document.getElementById('itemQty').value = item.qty;
            document.getElementById('itemStatus').value = item.status;
            document.getElementById('itemModal').classList.remove('hidden');
        }

        function saveItem(e) {
            e.preventDefault();
            const idx = document.getElementById('itemIndex').value;
            const itemData = {
                sn: document.getElementById('itemSn').value,
                name: document.getElementById('itemName').value,
                category: document.getElementById('itemCategory').value,
                qty: parseInt(document.getElementById('itemQty').value),
                status: document.getElementById('itemStatus').value,
                holder: idx === "" ? "คลังหลัก" : inventory[idx].holder
            };

            if (idx === "") inventory.push(itemData);
            else inventory[idx] = itemData;

            saveData();
            closeModal();
        }

        function deleteItem(idx) {
            if(confirm("🗑️ ต้องการลบอุปกรณ์นี้ออกจากระบบใช่หรือไม่?")) {
                inventory.splice(idx, 1);
                saveData();
            }
        }

        function showQRCode(sn, name) {
            document.getElementById('qrItemName').innerText = `${name} (${sn})`;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: `S/N: ${sn} - ${name}`, width: 140, height: 140 });
            document.getElementById('qrModal').classList.remove('hidden');
        }
        function closeQrModal() { document.getElementById('qrModal').classList.add('hidden'); }

        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(inventory);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "Inventory_Report.xlsx");
        }

        function importFromExcel(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(json.length > 0) { inventory = json; saveData(); alert("📤 นำเข้าข้อมูลสำเร็จ!"); }
            };
            reader.readAsArrayBuffer(file);
        }

        renderTable();
    </script>
</body>
</html>
